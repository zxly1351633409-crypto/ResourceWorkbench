<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<meta name="theme-color" content="#F4F0EA">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23537D96'/><text x='16' y='23' text-anchor='middle' font-size='20' fill='white' font-family='serif'>库</text></svg>">
<link rel="stylesheet" href="css/hana.css?v=3">
</head>
<body>

<div id="app">

  <!-- Title Bar -->
  <div id="title-bar">
    <div class="title-bar-left">
      <button class="title-bar-icon" id="btn-toggle-sidebar" title="收起/展开侧栏">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="16" height="14" rx="1.5"/><line x1="8" y1="3" x2="8" y2="17"/></svg>
      </button>
      <button class="title-bar-icon" id="btn-settings-titlebar" title="设置" style="margin-left:2px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
    <div class="title-bar-center">
      <div class="title-bar-pill" id="tab-pill">
        <div class="title-bar-pill-slider" id="tab-slider"></div>
        <button class="title-bar-tab active" id="btn-library-view" data-view="library">资源库</button>
        <button class="title-bar-tab" id="btn-work-view" data-view="work">待整理</button>
      </div>
    </div>
    <div class="title-bar-right">
      <div class="title-bar-controls">
        <button class="title-bar-btn" id="btn-minimize" title="最小化">
          <svg viewBox="0 0 12 2" fill="none" stroke="currentColor" stroke-width="1.2"><line x1="1" y1="1" x2="11" y2="1"/></svg>
        </button>
        <button class="title-bar-btn" id="btn-maximize" title="最大化">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1.5" y="1.5" width="9" height="9" rx="0.5"/></svg>
        </button>
        <button class="title-bar-btn title-bar-btn-close" id="btn-close" title="关闭">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- App Body -->
  <div class="app-body">

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-header">
        <span class="section-title">资源库</span>
      </div>
      <div class="sidebar-tree" id="sidebar-tree"></div>
      <div class="sidebar-footer">
        <span class="version-text" id="version-text">v0.3.1</span>
      </div>
    </div>

    <!-- Main Content -->
    <div id="main-content">

      <!-- Command Bar -->
      <div id="command-bar">
        <div class="command-input-wrap">
          <input type="text" id="input-path" placeholder="粘贴待整理路径、压缩包路径，或网页链接">
        </div>
        <button class="btn-analyze" id="btn-analyze">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="3 1 13 8 3 15 3 1"/></svg>
          分析
        </button>
        <button class="title-bar-action" id="btn-select-mode">多选</button>
        <button class="title-bar-icon" id="btn-history" title="操作历史" style="width:32px;height:30px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <button class="title-bar-icon" id="btn-more" title="更多" style="width:32px;height:30px">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="3" r="1.2"/><circle cx="8" cy="8" r="1.2"/><circle cx="8" cy="13" r="1.2"/></svg>
        </button>
        <button class="btn btn-danger" id="btn-cancel-analysis" style="display:none">取消</button>
      </div>

      <!-- Multi-select toolbar (hidden by default) -->
      <div id="select-toolbar" style="display:none;height:34px;align-items:center;gap:6px;padding:0 16px;background:var(--bg-card);border-bottom:0.5px solid var(--border);flex-shrink:0">
        <span class="caption" id="select-count">已选择 0 张</span>
        <div style="flex:1"></div>
        <button class="btn btn-sm" id="btn-select-all">全选</button>
        <button class="btn btn-sm" id="btn-clear-sel">清空</button>
        <button class="btn btn-sm" id="btn-translate-sel">翻译选中</button>
        <button class="btn btn-sm" id="btn-format-sel">整理选中</button>
        <button class="btn btn-sm" id="btn-move-sel">移动选中</button>
      </div>

      <!-- Analysis shimmer overlay -->
      <div id="analysis-overlay" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;z-index:10;background:rgba(244,240,234,0.85);flex-direction:column;align-items:center;justify-content:center;gap:14px">
        <div class="shimmer-progress-track">
          <div class="shimmer-progress-bar" style="width:0%"></div>
        </div>
        <span id="shimmer-text" class="shimmer-text">正在分析中...</span>
      </div>

      <!-- Card Wall -->
      <div id="card-wall-wrap">
        <div id="card-wall-library" class="card-wall-instance"></div>
        <div id="card-wall-work" class="card-wall-instance" style="display:none"></div>
        <div class="empty-state" id="empty-state">还没有卡片。可先设置资源库，或在路径框输入待整理路径。</div>
      </div>

      <!-- Status Bar -->
      <div id="status-bar">
        <span id="status-text">准备就绪</span>
      </div>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div id="detail-overlay" onclick="closeDetail()"></div>
<div id="detail-panel">
  <div class="detail-header">
    <h2 id="detail-title">预览与判断</h2>
    <button class="btn btn-icon" onclick="closeDetail()" style="width:28px;height:28px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- Context Menu -->
<div class="context-menu" id="context-menu"></div>

<!-- Modal Container -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box"></div>
</div>

<script src="js/utils.js?v=3"></script>
<script src="js/api.js?v=3"></script>
<script src="js/components/sidebar.js?v=3"></script>
<script src="js/components/card.js?v=3"></script>
<script src="js/components/card-wall.js?v=3"></script>
<script src="js/components/detail-panel.js?v=3"></script>
<script src="js/components/command-bar.js?v=3"></script>
<script src="js/components/settings.js?v=3"></script>
<script src="js/components/target-picker.js?v=3"></script>
<script src="js/app.js?v=3"></script>

</body>
</html>
